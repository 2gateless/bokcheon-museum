<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>복천박물관 소개</title>
    <meta name="description" content="가야의 숨결이 살아 숨 쉬는 부산 복천박물관 모바일 안내">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/p_1.png">
    <link rel="apple-touch-icon" href="images/p_1.png">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="header-section">
        <div class="title-container">
            <h1 class="main-title">
                <div class="title-line-1">
                    <span class="title-handwritten">즐거운</span>
                </div>
                <div class="title-line-2">
                    <span class="title-main">복천박물관</span>
                    <span class="title-handwritten">둘러보기</span>
                </div>
            </h1>
            <p class="subtitle">가야의 숨결, 부산의 기원</p>
        </div>
        <img src="images/p_1-re.png" alt="복천박물관 유물" class="header-deco-img">
    </header>

    <main class="content-section">
        <div class="category-list">
            <a href="#tomb" class="category-box" data-category="무덤" id="tomb-btn">
                <span class="box-number">01</span>
                <h3>무덤</h3>
                <span class="arrow">→</span>
            </a>
            <div class="submenu-container" id="tomb-submenu">
                <a href="#stone-coffin" class="submenu-item">
                    <span class="submenu-bullet">•</span> 돌널무덤(석관묘)
                </a>
                <a href="#pit-grave" class="submenu-item">
                    <span class="submenu-bullet">•</span> 움무덤(토광묘)
                </a>
                <a href="#stone-chamber" class="submenu-item">
                    <span class="submenu-bullet">•</span> 돌덧널무덤(석곽묘)
                </a>
                <a href="#jar-coffin" class="submenu-item">
                    <span class="submenu-bullet">•</span> 독널무덤(옹관묘)
                </a>
            </div>
            <a href="#pottery" class="category-box" data-category="토기" id="pottery-btn">
                <span class="box-number">02</span>
                <h3>토기</h3>
                <span class="arrow">→</span>
            </a>
            <div class="submenu-container" id="pottery-submenu">
                <a href="#duck-pottery" class="submenu-item">
                    <span class="submenu-bullet">•</span> 오리 모양 토기
                </a>
                <a href="#shoes-pottery" class="submenu-item">
                    <span class="submenu-bullet">•</span> 신발 모양 토기
                </a>
                <a href="#turtle-vessel" class="submenu-item">
                    <span class="submenu-bullet">•</span> 거북장식 원통형 그릇받침
                </a>
            </div>
            <a href="#iron" class="category-box" data-category="철기" id="iron-btn">
                <span class="box-number">03</span>
                <h3>철기</h3>
                <span class="arrow">→</span>
            </a>
            <div class="submenu-container" id="iron-submenu">
                <a href="#armor" class="submenu-item">
                    <span class="submenu-bullet">•</span> 갑옷
                </a>
                <a href="#bells" class="submenu-item">
                    <span class="submenu-bullet">•</span> 가지방울
                </a>
            </div>
            <a href="#ornament" class="category-box" data-category="장식품" id="ornament-btn">
                <span class="box-number">04</span>
                <h3>장식품</h3>
                <span class="arrow">→</span>
            </a>
            <div class="submenu-container" id="ornament-submenu">
                <a href="#crown" class="submenu-item">
                    <span class="submenu-bullet">•</span> 금동관
                </a>
            </div>
            <a href="map.html" class="category-box" data-category="천상열차분야지도">
                <span class="box-number">05</span>
                <h3>천상열차분야지도</h3>
                <span class="arrow">→</span>
            </a>
        </div>
        
        <div class="bottom-images">
            <img src="images/b_2.jpg" alt="복천박물관 전경">
            <img src="images/b_3.jpg" alt="복천박물관 관련 이미지">
        </div>
        
        <div class="footer-text">
            2026 Spring, Google Antigravity, JHS v1.1
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
