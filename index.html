<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>복천박물관 소개</title>
    <meta name="description" content="가야의 숨결이 살아 숨 쉬는 부산 복천박물관 모바일 안내">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header-section">
        <div class="title-container">
            <h1>복천박물관 소개</h1>
            <p class="subtitle">부산 문화의 기원</p>
            <p class="description">가야의 숨결이 살아 숨쉬는 곳</p>
        </div>
    </header>

    <main class="content-section">
        <div class="category-list">
            <a href="#tomb" class="category-box" data-category="고분">
                <span class="box-number">01</span>
                <h3>고분</h3>
                <span class="arrow">→</span>
            </a>
            <a href="#pottery" class="category-box" data-category="토기">
                <span class="box-number">02</span>
                <h3>토기</h3>
                <span class="arrow">→</span>
            </a>
            <a href="#iron" class="category-box" data-category="철기">
                <span class="box-number">03</span>
                <h3>철기</h3>
                <span class="arrow">→</span>
            </a>
            <a href="#ornament" class="category-box" data-category="장식품">
                <span class="box-number">04</span>
                <h3>장식품</h3>
                <span class="arrow">→</span>
            </a>
            <a href="map.html" class="category-box" data-category="천상열차분야지도">
                <span class="box-number">05</span>
                <h3>천상열차분야지도</h3>
                <span class="arrow">→</span>
            </a>
        </div>
        
        <div class="bottom-images">
            <img src="images/b_2.jpg" alt="복천박물관 전경">
            <img src="images/b_3.jpg" alt="복천박물관 관련 이미지">
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
